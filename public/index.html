<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="format-detection" content="telephone=no">
    
    <title>Miso Chat</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23e94560'/><text y='65' x='50' text-anchor='middle' font-size='50'>🍲</text></svg>">
    <link rel="apple-touch-startup-image" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a1a2e' width='100' height='100'/><text y='65' x='50' text-anchor='middle' font-size='50'>🍲</text></svg>">
    
    <style>
        :root {
            --bg-primary: #0d0d14;
            --bg-secondary: #161625;
            --bg-tertiary: #1e1e32;
            --accent: #e94560;
            --accent-gradient: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
            --border: #2a2a40;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --safe-area-top: env(safe-area-inset-top, 20px);
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
        }
        
        /* Header */
        .header {
            background: var(--bg-secondary);
            padding: calc(var(--safe-area-top) + 12px) 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 2px 12px rgba(233, 69, 96, 0.4);
        }
        
        .header-info h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .header-info .status {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4757;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #2ed573;
            animation: none;
        }
        
        .session-select {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
            cursor: pointer;
            line-height: 1;
        }

        .icon-btn:active {
            transform: scale(0.96);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        
        .message {
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.miso {
            align-self: flex-start;
        }
        
        .message.user {
            align-self: flex-end;
        }
        
        .bubble {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }
        
        .message.miso .bubble {
            background: var(--bg-tertiary);
            border-bottom-left-radius: 6px;
            color: var(--text-primary);
        }
        
        .message.user .bubble {
            background: var(--accent-gradient);
            border-bottom-right-radius: 6px;
            color: white;
            font-weight: 500;
        }
        
        .message .image-attachment {
            margin-top: 10px;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-tertiary);
        }
        
        .message .image-attachment img {
            display: block;
            max-width: 100%;
            width: 100%;
            height: auto;
        }
        
        .message.system {
            align-self: center;
            max-width: 90%;
        }
        
        .message.system .bubble {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 13px;
            text-align: center;
            border-radius: 12px;
            padding: 10px 16px;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 0 16px 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .quick-actions::-webkit-scrollbar {
            display: none;
        }
        
        .quick-btn {
            flex-shrink: 0;
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .quick-btn:active {
            transform: scale(0.95);
            background: var(--accent);
            border-color: var(--accent);
        }
        
        /* Input */
        .input-area {
            background: var(--bg-secondary);
            padding: calc(var(--safe-area-bottom) + 12px) 16px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }
        
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        
        .input-wrapper input:focus {
            border-color: var(--accent);
        }
        
        .input-wrapper input::placeholder {
            color: var(--text-secondary);
        }
        
        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: var(--accent-gradient);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(233, 69, 96, 0.4);
        }
        
        .send-btn:active {
            transform: scale(0.92);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            transform: none;
        }
        
        /* Typing indicator */
        .typing {
            display: none;
            padding: 0 16px 12px;
        }
        
        .typing.active {
            display: block;
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            width: fit-content;
        }
        
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        
        /* Pull to refresh hint */
        .refresh-hint {
            text-align: center;
            padding: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .refresh-hint.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="avatar">🍲</div>
        <div class="header-info">
            <h1 id="assistantName">Miso</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
        <div class="header-controls">
            <button class="icon-btn" id="refreshBtn" title="Refresh" aria-label="Refresh">↻</button>
            <select id="sessionSelect" class="session-select" onchange="selectSession(this.value)">
                <option value="">Loading sessions...</option>
            </select>
            <button class="icon-btn" id="logoutBtn" title="Logout" aria-label="Logout">⎋</button>
        </div>
    </header>
    
    <div class="messages" id="messages">
        <div class="message miso">
            <div class="bubble">Hey there! 👋 Connected! What would you like?</div>
        </div>
    </div>
    
    <div class="typing" id="typingIndicator">
        <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Message Miso..." autocomplete="off" autocorrect="off" autocapitalize="sentences">
        </div>
        <button type="button" class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <script>
        let currentSessionKey = null;
        let defaultSessionKey = 'agent:main:main';
        let sendQueue = loadPendingQueue();
        let sending = false;

        const SESSION_STORAGE_KEY = 'miso.selectedSessionKey';
        const QUEUE_STORAGE_KEY = 'miso.pendingQueue';

        function loadPendingQueue() {
            try {
                const stored = localStorage.getItem(QUEUE_STORAGE_KEY);
                return stored ? JSON.parse(stored) : [];
            } catch { return []; }
        }

        function savePendingQueue(queue) {
            try {
                localStorage.setItem(QUEUE_STORAGE_KEY, JSON.stringify(queue));
            } catch { /* ignore storage errors */ }
        }

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const typingIndicator = document.getElementById('typingIndicator');
        const sessionSelect = document.getElementById('sessionSelect');
        const assistantNameEl = document.getElementById('assistantName');
        const refreshBtn = document.getElementById('refreshBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        function setOnlineState(online, text = null) {
            statusDot.classList.toggle('connected', !!online);
            statusText.textContent = text || (online ? 'Online' : 'Offline');
            messageInput.disabled = !online;
            sendBtn.disabled = !online;
        }

        function buildSessionLabel(session) {
            const key = session.sessionKey || '';
            const shortKey = key.slice(0, 8);
            const title = session.title || session.displayName || session.channel || session.kind || 'session';
            return `${title} · ${shortKey}`;
        }

        function addMessage(sender, content) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = String(content || '');
            div.appendChild(bubble);
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function renderHistory(messages) {
            messagesDiv.innerHTML = '';
            if (!Array.isArray(messages) || messages.length === 0) {
                addMessage('system', '📝 New session');
                return;
            }
            messages.forEach((msg) => {
                addMessage(msg.role === 'user' ? 'user' : 'miso', msg.content);
            });
        }

        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const cfg = await response.json();
                if (cfg?.assistantName) {
                    assistantNameEl.textContent = cfg.assistantName;
                    messageInput.placeholder = `Message ${cfg.assistantName}...`;
                }
                if (cfg?.title) document.title = cfg.title;
                if (cfg?.defaultSessionKey) defaultSessionKey = cfg.defaultSessionKey;
            } catch (error) {
                console.warn('Config load failed:', error);
            }
        }

        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                const sessions = Array.isArray(data.sessions) ? data.sessions : [];

                if (data.defaultSessionKey) defaultSessionKey = data.defaultSessionKey;

                sessionSelect.innerHTML = '<option value="">Select session...</option>';

                sessions.forEach((session) => {
                    const option = document.createElement('option');
                    option.value = session.sessionKey;
                    option.textContent = buildSessionLabel(session);
                    sessionSelect.appendChild(option);
                });

                if (sessions.length === 0) {
                    setOnlineState(false, 'No sessions');
                    return;
                }

                const stored = localStorage.getItem(SESSION_STORAGE_KEY);
                const preferred = stored || defaultSessionKey || sessions[0].sessionKey;
                const selected = sessions.find((s) => s.sessionKey === preferred) || sessions[0];
                await selectSession(selected.sessionKey);
            } catch (error) {
                console.error('Error loading sessions:', error);
                sessionSelect.innerHTML = '<option value="">Error</option>';
                setOnlineState(false, 'Session load failed');
            }
        }

        async function selectSession(sessionKey) {
            if (!sessionKey) return;

            currentSessionKey = sessionKey;
            localStorage.setItem(SESSION_STORAGE_KEY, sessionKey);
            sessionSelect.value = sessionKey;
            setOnlineState(true, 'Loading history...');

            try {
                const response = await fetch(`/api/sessions/${encodeURIComponent(sessionKey)}/history`);
                const data = await response.json();
                renderHistory(data.messages || []);
                setOnlineState(true, 'Online');
            } catch (error) {
                console.error('History load error:', error);
                renderHistory([]);
                setOnlineState(true, 'Online');
            }
        }

        async function processQueue() {
            if (sending || sendQueue.length === 0) return;
            if (!currentSessionKey) return;

            sending = true;
            const next = sendQueue.shift();
            savePendingQueue(sendQueue);

            if (sendQueue.length > 0) {
                setOnlineState(true, `Online · queue ${sendQueue.length}`);
            } else {
                setOnlineState(true, 'Online');
            }

            typingIndicator.classList.add('active');
            try {
                const response = await fetch(`/api/sessions/${encodeURIComponent(currentSessionKey)}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: next }),
                });
                const data = await response.json();

                if (!data?.success) {
                    addMessage('system', data?.error || 'Send failed');
                } else {
                    const text = data.responseText || data.response?.text || data.response?.message;
                    if (text && text.trim()) {
                        addMessage('miso', text);
                    }
                }
            } catch (error) {
                console.error('Send error:', error);
                addMessage('system', `Send failed: ${error.message}`);
            } finally {
                typingIndicator.classList.remove('active');
                sending = false;
                setOnlineState(true, sendQueue.length > 0 ? `Online · queue ${sendQueue.length}` : 'Online');
                if (sendQueue.length > 0) processQueue();
            }
        }

        function sendMessage(text = null) {
            const messageText = (text || messageInput.value || '').trim();
            if (!messageText) return;
            if (!currentSessionKey) {
                addMessage('system', 'Select a session first.');
                return;
            }

            addMessage('user', messageText);
            messageInput.value = '';
            messageInput.focus();
            sendQueue.push(messageText);
            savePendingQueue(sendQueue);
            processQueue();
        }

        async function refreshCurrentSession() {
            if (currentSessionKey) {
                await selectSession(currentSessionKey);
            } else {
                await loadSessions();
            }
        }

        async function logout() {
            try {
                await fetch('/logout', { method: 'POST' });
            } finally {
                window.location.href = '/login';
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        refreshBtn.addEventListener('click', refreshCurrentSession);
        logoutBtn.addEventListener('click', logout);
        sendBtn.addEventListener('click', () => sendMessage());

        (async () => {
            setOnlineState(false, 'Connecting...');
            await loadConfig();
            await loadSessions();
        })();
    </script>
</body>
</html>
