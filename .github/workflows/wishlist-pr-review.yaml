---
name: Wishlist PR Review (AI)

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

concurrency:
  group: wishlist-pr-review
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  review-wishlist-pr:
    name: Wishlist PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: PR context
        id: pr-context
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo "PR_NUM=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "PR_AUTHOR=${{ github.event.pull_request.user.login }}" >> "$GITHUB_OUTPUT"
            echo "IS_DRAFT=${{ github.event.pull_request.draft }}" >> "$GITHUB_OUTPUT"
          else
            echo "PR_NUM=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "IS_DRAFT=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate author
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ steps.pr-context.outputs.PR_AUTHOR }}" != "itsmiso-ai" ]; then
            echo "NOT_ME=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip non-itsmiso-ai or draft
        if: steps.pr-context.outputs.NOT_ME == 'true' || steps.pr-context.outputs.IS_DRAFT == 'true'
        run: |
          echo "Skipping: author=${{ steps.pr-context.outputs.PR_AUTHOR }}, draft=${{ steps.pr-context.outputs.IS_DRAFT }}"

      - name: Checkout
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-context.outputs.HEAD_SHA || github.event.inputs.pr_number }}

      - name: Validate secrets
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true'
        run: |
          set -euo pipefail
          echo "MINIMAX_API_KEY set: ${#MINIMAX_API_KEY} chars"
          echo "MISO_BOT_APP_ID set: ${#MISO_BOT_APP_ID} chars"
          echo "MISO_BOT_PRIVATE_KEY set: ${#MISO_BOT_PRIVATE_KEY} chars"

      - name: Generate bot token
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true'
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ env.MISO_BOT_APP_ID }}
          private-key: ${{ env.MISO_BOT_PRIVATE_KEY }}

      - name: Set GH_TOKEN
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true'
        run: |
          echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Get PR data
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true'
        run: |
          set -euo pipefail
          PR_NUM="${{ steps.pr-context.outputs.PR_NUM }}"
          gh pr view "$PR_NUM" --repo "$GITHUB_REPOSITORY" --json number,title,body,headRefOid,author,url > pr.json
          gh pr diff "$PR_NUM" --repo "$GITHUB_REPOSITORY" > pr.diff
          head -c 100000 pr.diff > pr.diff.truncated
          gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUM/files" --paginate > pr-files.raw.json

      - name: Gather linked issues
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true'
        run: |
          set -euo pipefail
          : > linked-issues.md
          BODY=$(jq -r '.body // ""' pr.json)
          echo "$BODY" | grep -oE '#[0-9]+' | sort -u | head -5 > nums.txt || true
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            num="${ref#\#}"
            echo "## #$num" >> linked-issues.md
            if gh issue view "$num" --repo "$GITHUB_REPOSITORY" --json number,title,body,state > issue.json 2>/dev/null; then
              echo "**$(jq -r '.title' issue.json)** (State: $(jq -r '.state' issue.json))" >> linked-issues.md
              jq -r '.body // ""' issue.json | head -c 1500 >> linked-issues.md
            fi
          done < nums.txt
          [ ! -s linked-issues.md ] && echo "(No linked issues)" > linked-issues.md

      - name: Check skip criteria
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true'
        id: skip-check
        run: |
          set -euo pipefail
          NONLOCK=$(jq '[.[] | select(.filename | test("\\.(lock|package-lock\\.json|yarn\\.lock|pnpm-lock\\.yaml)$") | not)] | length' pr-files.raw.json)
          echo "Non-lock files: $NONLOCK"
          if [ "$NONLOCK" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build corpus
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true' && steps.skip-check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export PR_NUM="${{ steps.pr-context.outputs.PR_NUM }}"
          python3 .github/workflows/build_corpus.py

      - name: Analyze with minimax
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true' && steps.skip-check.outputs.skip != 'true'
        id: analyze
        run: |
          set -euo pipefail
          python3 .github/workflows/analyze.py

      - name: Post review comment
        if: steps.pr-context.outputs.NOT_ME != 'true' && steps.pr-context.outputs.IS_DRAFT != 'true'
        run: |
          set -euo pipefail
          export PR_NUM="${{ steps.pr-context.outputs.PR_NUM }}"
          export SKIP="${{ steps.skip-check.outputs.skip || 'false' }}"
          export AI_FAILED="${{ steps.analyze.outputs.ai_failed || 'true' }}"
          export VERDICT="${{ steps.analyze.outputs.verdict || 'comment' }}"
          python3 .github/workflows/post_comment.py

      - name: Summary
        if: always()
        run: |
          echo "PR #${{ steps.pr-context.outputs.PR_NUM }} — skip: ${{ steps.skip-check.outputs.skip || 'false' }}, verdict: ${{ steps.analyze.outputs.verdict || 'n/a' }}"
